name: BridgeBack Release Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bridgeback
          POSTGRES_USER: bridgeback
          POSTGRES_PASSWORD: bridgeback
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bridgeback -d bridgeback"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff
      - name: Lint backend
        run: ruff check . --ignore E501
      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+psycopg://bridgeback:bridgeback@localhost:5432/bridgeback
          DEFAULT_LLM: ollama
        run: pytest tests/ -v --tb=short

  flutter-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter pub get
        run: flutter pub get
      - name: Flutter analyze
        run: flutter analyze
      - name: Flutter test
        run: flutter test
      - name: Build Flutter web
        run: flutter build web --release

  android-build:
    runs-on: ubuntu-latest
    needs: flutter-quality
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter pub get
        run: flutter pub get
      - name: Build Android APK
        run: flutter build apk --release
