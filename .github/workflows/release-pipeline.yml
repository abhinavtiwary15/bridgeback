name: BridgeBack Release Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff
      - name: Lint backend
        run: ruff check . --ignore E501
      - name: Run offline backend tests
        env:
          DATABASE_URL: sqlite:///test_bridgeback.db
          DEFAULT_LLM: gemini
        run: |
          pytest tests/test_nlp.py \
                 tests/test_database_tracking.py \
                 tests/test_no_usage_mode.py \
                 tests/test_accountability_service.py \
                 tests/test_api_dependencies.py \
                 tests/test_priority_engine.py \
                 tests/test_rejection_trainer.py \
                 tests/test_views_smoke.py \
                 -v --tb=short
