version: "3.9"
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://bridgeback:bridgeback@db:5432/bridgeback
    depends_on:
      - db

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: bridgeback
      POSTGRES_USER: bridgeback
      POSTGRES_PASSWORD: bridgeback
    ports:
      - "5432:5432"
    volumes:
      - bridgeback_pgdata:/var/lib/postgresql/data

volumes:
  bridgeback_pgdata:
